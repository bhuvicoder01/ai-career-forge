server:
  port: ${PORT:8080}

spring:
  config:
    activate:
      on-profile: prod

  autoconfigure:
    exclude:
      - org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration
      - org.springframework.ai.autoconfigure.ollama.OllamaAutoConfiguration

  ai:
    ollama:
      chat:
        enabled: false
      embedding:
        enabled: false
    openai:
      chat:
        enabled: true
        base-url: https://generativelanguage.googleapis.com/v1beta/openai
        api-key: ${GOOGLE_AI_API_KEY}
        options:
          model: ${GOOGLE_AI_MODEL:gemini-2.0-flash}
      embedding:
        enabled: false 
    vectorstore:
      mongodb:
        collection-name: vector_store
        index-name: vector_index
        path-name: embedding
        initialize-schema: false
        metadata-fields-to-filter:
          - class
          - type
          - userId

  data:
    mongodb:
      uri: ${MONGODB_URI}
    redis:
      url: ${REDIS_URL:}
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 60000
  cache:
    type: redis
    redis:
      time-to-live: 3600000 # 1 hour default
      
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: ${SMTP_STARTTLS_ENABLE:true}
            required: true
          ssl:
            enable: ${SMTP_SSL_ENABLE:false}
          socketFactory:
            port: ${SMTP_PORT:465}
            class: ${SMTP_SSL_CLASS:javax.net.ssl.SSLSocketFactory}
            fallback: false
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  resend:
    api-key: ${RESEND_API_KEY}
    from-email: ${RESEND_FROM_EMAIL}
        
  sendgrid:
    api-key: ${SENDGRID_API_KEY}
    from-email: ${SENDGRID_FROM_EMAIL}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

  cloud:
    aws:
      credentials:
        access-key: ${AWS_ACCESS_KEY_ID}
        secret-key: ${AWS_SECRET_ACCESS_KEY}
      region:
        static: ${AWS_REGION:us-east-1}
      s3:
        bucket-name: ${AWS_S3_BUCKET_NAME:ai-career-forge-users-data-bucket}

  main:
    banner-mode: off
    log-startup-info: false

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://ai-career-forge-sable.vercel.app}

adzuna:
  app-id: ${ADZUNA_APP_ID}
  app-key: ${ADZUNA_APP_KEY}
  country: ${ADZUNA_COUNTRY:in}

rapidapi:
  key: ${RAPIDAPI_KEY}
  jsearch-host: jsearch.p.rapidapi.com

app:
  frontend-url: ${FRONTEND_URL:https://ai-career-forge-sable.vercel.app}
  backend-url: ${BACKEND_URL:https://ai-career-forge-47ob.onrender.com}

logo:
  dev: 
    token: ${LOGO_DEV_TOKEN}

brandfetch:
  api-token: ${BRANDFETCH_TOKEN}

resend:
  api-key: ${RESEND_API_KEY}
  from-email: ${RESEND_FROM_EMAIL:onboarding@resend.dev}

logging:
  level:
    root: WARN
    org.springframework.ai: INFO
    com.aicareerforge: INFO
