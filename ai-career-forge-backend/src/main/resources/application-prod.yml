server:
  port: ${PORT:8080}

spring:
  config:
    activate:
      on-profile: prod

  autoconfigure:
    exclude:
      - org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration
      - org.springframework.ai.autoconfigure.ollama.OllamaAutoConfiguration

  ai:
    ollama:
      chat:
        enabled: false
      embedding:
        enabled: false
    openai:
      chat:
        enabled: true
        base-url: https://generativelanguage.googleapis.com/v1beta/openai
        api-key: ${GOOGLE_AI_API_KEY}
        options:
          model: ${GOOGLE_AI_MODEL:gemini-2.0-flash}
      embedding:
        enabled: false 
    vectorstore:
      mongodb:
        collection-name: vector_store
        index-name: vector_index
        path-name: embedding
        initialize-schema: false
        metadata-fields-to-filter:
          - class
          - type
          - userId

  data:
    mongodb:
      uri: ${MONGODB_URI}

  cloud:
    aws:
      credentials:
        access-key: ${AWS_ACCESS_KEY_ID}
        secret-key: ${AWS_SECRET_ACCESS_KEY}
      region:
        static: ${AWS_REGION:us-east-1}
      s3:
        bucket-name: ${AWS_S3_BUCKET_NAME:ai-career-forge-users-data-bucket}

  main:
    banner-mode: off
    log-startup-info: false

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://ai-career-forge-sable.vercel.app}

adzuna:
  app-id: ${ADZUNA_APP_ID}
  app-key: ${ADZUNA_APP_KEY}
  country: ${ADZUNA_COUNTRY:in}

app:
  frontend-url: ${FRONTEND_URL:https://ai-career-forge-sable.vercel.app}

logging:
  level:
    root: WARN
    org.springframework.ai: INFO
    com.aicareerforge: INFO
