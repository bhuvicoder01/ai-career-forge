server:
  port: ${PORT:8080}
spring:
  config:
    activate:
      on-profile: prod

  autoconfigure:
    exclude:
      - org.springframework.ai.autoconfigure.ollama.OllamaAutoConfiguration

  ai:
    ollama:
      chat:
        enabled: false
      embedding:
        enabled: false
    openai:
      chat:
        enabled: true
        base-url: https://generativelanguage.googleapis.com/v1beta/openai/
        api-key: ${GOOGLE_AI_API_KEY}
        options:
          model: ${GOOGLE_AI_MODEL:gemini-1.5-flash}
      embedding:
        enabled: false # Bypassing buggy M1 starter; using custom GeminiEmbeddingModel instead

  data:
    mongodb:
      uri: ${MONGODB_URI}

jwt:
  secret: ${JWT_SECRET:8a3c9b7d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    org.springframework.ai: INFO
    com.aicareerforge: INFO
