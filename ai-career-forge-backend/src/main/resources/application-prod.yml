server:
  port: ${PORT:8080}
spring:
  config:
    activate:
      on-profile: prod

  autoconfigure:
    exclude:
      - io.awspring.cloud.autoconfigure.core.AwsAutoConfiguration
      - io.awspring.cloud.autoconfigure.s3.S3AutoConfiguration
      - io.awspring.cloud.autoconfigure.core.CredentialsProviderAutoConfiguration
      - io.awspring.cloud.autoconfigure.core.RegionProviderAutoConfiguration
      - org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration
      - org.springframework.ai.autoconfigure.ollama.OllamaAutoConfiguration

  ai:
    openai:
      chat:
        enabled: true # Ensure chat is explicitly enabled for prod if needed, 
                      # but it's already true in application.yml
    vectorstore:
      mongodb:
        collection-name: vector_store
        index-name: vector_index
        path-name: embedding
        initialize-schema: false

  data:
    mongodb:
      uri: ${MONGODB_URI}

jwt:
  secret: ${JWT_SECRET:8a3c9b7d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d}
  expiration: ${JWT_EXPIRATION:86400000}

  main:
    banner-mode: off
    log-startup-info: false

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://ai-career-forge-sable.vercel.app,http://localhost:3000}

logging:
  level:
    root: WARN
    org.springframework.ai: INFO
    com.aicareerforge: INFO
