spring:
  application:
    name: ai-career-forge-backend
  autoconfigure:
    exclude:
      - io.awspring.cloud.autoconfigure.core.AwsAutoConfiguration
      - io.awspring.cloud.autoconfigure.s3.S3AutoConfiguration
      - io.awspring.cloud.autoconfigure.core.CredentialsProviderAutoConfiguration
      - io.awspring.cloud.autoconfigure.core.RegionProviderAutoConfiguration

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb+srv://bhuvicoder01:9806671598@aicareerforgetestingdat.wtiunqr.mongodb.net/aiCareerForge}

  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_CHAT_MODEL:llama3.2}
      embedding:
        options:
          model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}
    vectorstore:
      mongodb:
        collection-name: vector_store
        index-name: vector_index
        path-name: embedding
        metadata-fields-to-filter:
          - class
          - type
          - userId

